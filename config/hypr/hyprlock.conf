# hyprlock configuration
# See https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_size = 8
    blur_passes = 3
    brightness = 0.5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(ffffffff)
    font_size = 72
    font_family = monospace
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(ffffffcc)
    font_size = 20
    font_family = monospace
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgba(0088CCee)
    inner_color = rgba(000000cc)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    placeholder_text = <i>Password</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
