# Hyprland configuration
# See https://wiki.hyprland.org/Configuring/

# Monitor config — kanshi handles multi-monitor profiles
monitor = , preferred, auto, 1.25

# Variables
$mod        = SUPER
$terminal   = alacritty
$fileManager = thunar
$menu       = rofi -show run

# Environment variables
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME, qt5ct

# NVIDIA
env = LIBVA_DRIVER_NAME, nvidia
env = XDG_SESSION_TYPE, wayland
env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = WLR_NO_HARDWARE_CURSORS, 1

# Autostart
exec-once = ~/.config/waybar/launch-hyprland.sh
exec-once = env QT_QPA_PLATFORM=xcb nextcloud
exec-once = copyq
exec-once = blueman-applet
exec-once = kanshi
exec-once = swww-daemon
exec-once = hypridle
exec-once = hyprswitch init --show-title
exec-once = dunst

exec-always = swww img $(find ~/Nextcloud/wallpapers/ -iname "*.jpg" -o -iname "*.png" | shuf -n1)

input {
    kb_layout           = us
    kb_options          = compose:ralt,caps:escape
    numlock_by_default  = true
    follow_mouse        = 0

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0
}

general {
    gaps_in     = 3
    gaps_out    = 5
    border_size = 2

    col.active_border   = rgba(0088CCee)
    col.inactive_border = rgba(333333aa)

    layout = dwindle

    allow_tearing = false
}

decoration {
    rounding = 3

    blur {
        enabled   = true
        size      = 3
        passes    = 1
        vibrancy  = 0.1696
    }

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }
}

animations {
    enabled = false

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,    1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border,     1, 10, default
    animation = borderangle,1, 8,  default
    animation = fade,       1, 7,  default
    animation = workspaces, 1, 6,  default
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
}

xwayland {
    force_zero_scaling = true  # prevents blur on XWayland apps with fractional scaling
}

# Window rules
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = float-misc
    match:class = ^(pavucontrol|blueman-manager|galculator|copyq|steam)$
    float = yes
}

windowrule {
    name = tile-steam
    match:class = ^(steam)$
    match:title = ^(Steam)$
    tile = yes
}

windowrule {
    name = ws-thunderbird
    match:class = ^(thunderbird)$
    workspace = 2
}

windowrule {
    name = ws-firefox
    match:class = ^(firefox)$
    workspace = 4
}

windowrule {
    name = ws-idea
    match:class = ^(jetbrains-idea)$
    workspace = 6
}

# ─── Keybindings ──────────────────────────────────────────────────────────────

# Core
bind = $mod,       Return,      exec,           $terminal
bind = $mod,       D,           exec,           rofi -show run
bind = $mod CTRL,  D,           exec,           rofi -show combi
bind  = $mod,      Tab,         exec,           rofi -show window
bind  = ALT,       Tab,         exec,           hyprswitch gui --mod-key alt --key tab --close mod-key-release && hyprswitch dispatch
bindrt = ALT,      Alt_L,       exec,           hyprswitch close --kill
bind = $mod,       E,           exec,           $fileManager
bind = $mod SHIFT, Q,          killactive,
bind = $mod SHIFT, space,      togglefloating,
bind = $mod,       P,           pseudo,
bind = $mod,       F,           fullscreen,
bind = $mod,       B,           layoutmsg,      preselect r
bind = $mod,       V,           layoutmsg,      preselect d
bind = $mod,       E,           togglesplit,
bind = $mod SHIFT, C,           exec,           hyprctl reload
bind = $mod SHIFT, W,           exec,           pkill waybar && ~/.config/waybar/launch-hyprland.sh
bind = $mod,       Escape,      exec,           hyprlock

# Focus — arrow keys + HJKL
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, J,     movefocus, d
bind = $mod, K,     movefocus, u
bind = $mod, L,     movefocus, r

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Workspaces — numbered
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9
bind = $mod,       0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Workspaces — navigation
bind = $mod,       Prior,     workspace, e-1
bind = $mod,       Next,      workspace, e+1
bind = $mod CTRL,  H,         workspace, e-1
bind = $mod CTRL,  L,         workspace, e+1
bind = $mod SHIFT, Prior,     movetoworkspace, e-1
bind = $mod SHIFT, Next,      movetoworkspace, e+1
bind = $mod SHIFT, BackSpace, workspace, previous
bind = $mod SHIFT, B,         movetoworkspace, previous
bind = $mod,       N,         workspace, empty

# Special workspace (scratchpad)
bind = $mod,       S, togglespecialworkspace, default
bind = $mod SHIFT, S, movetoworkspace, special:default

# Mouse workspace scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bind = , XF86AudioRaiseVolume, exec, ~/.dotfiles/util/audio/raise-volume.sh
bind = , XF86AudioLowerVolume, exec, ~/.dotfiles/util/audio/lower-volume.sh
bind = , XF86AudioMute,        exec, ~/.dotfiles/util/audio/toggle-audio.sh
bind = $mod, XF86AudioMute,    exec, pavucontrol

# Media
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous

# Brightness
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Display / monitor management
bind = , XF86Display, exec, nwg-displays
bind = $mod, M,        exec, kanshictl reload

# ─── Submaps ──────────────────────────────────────────────────────────────────

# kblayout — keyboard layout switching
bind = $mod, Insert, submap, kblayout
submap = kblayout
bind = , U, exec, hyprctl keyword input:kb_layout us && hyprctl keyword input:kb_options compose:ralt,caps:escape
bind = , U, submap, reset
bind = , C, exec, hyprctl keyword input:kb_layout ch && hyprctl keyword input:kb_options caps:escape
bind = , C, submap, reset
bind = , Escape, submap, reset
submap = reset

# screenshot
bind = , Print, exec, ~/.dotfiles/util/screenshot/screenshot.sh

# resize
bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive,  10  0
binde = , left,  resizeactive, -10  0
binde = , up,    resizeactive,   0 -10
binde = , down,  resizeactive,   0  10
binde = , L,     resizeactive,  10  0
binde = , H,     resizeactive, -10  0
binde = , K,     resizeactive,   0 -10
binde = , J,     resizeactive,   0  10
bind  = , Escape, submap, reset
submap = reset

# system — power/session management
bind = $mod, Pause, submap, system
submap = system
bind = , L,       exec,    hyprlock
bind = , L,       submap,  reset
bind = , E,       exit,
bind = , S,       exec,    systemctl suspend
bind = , S,       submap,  reset
bind = , H,       exec,    systemctl hibernate
bind = , H,       submap,  reset
bind = , R,       exec,    systemctl reboot
bind = , R,       submap,  reset
bind = SHIFT, S,  exec,    systemctl poweroff -i
bind = SHIFT, S,  submap,  reset
bind = , Escape,  submap,  reset
submap = reset

# thinkpad — ThinkPad-specific
bind = $mod, T, submap, thinkpad
submap = thinkpad
bind = , T, exec, ~/.dotfiles/util/misc/toggle-touchpad.sh
bind = , T, submap, reset
bind = , Escape, submap, reset
submap = reset
